<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Enterprise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #0f3460; }
        .header h1 { color: #e94560; font-size: 24px; }
        .header p { color: #a0a0a0; font-size: 14px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user-message { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background: #16213e; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid #e94560; }
        .sources { font-size: 11px; color: #a0a0a0; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
        .input-area { background: #16213e; padding: 20px; display: flex; gap: 10px; border-top: 2px solid #0f3460; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #fff; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #e94560; }
        .input-area button { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .input-area button:hover { background: #c73652; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }
        .typing { color: #a0a0a0; font-style: italic; font-size: 13px; }
        .welcome { text-align: center; color: #a0a0a0; margin-top: 40px; }
        .welcome h2 { color: #e94560; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 DocuMind Enterprise</h1>
        <p>AI-Powered Corporate Knowledge Assistant</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="welcome">
            <h2>Welcome to DocuMind</h2>
            <p>Ask any question about your documents.</p>
            <p>I will only answer based on verified document content.</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Ask a question about your documents..." onkeypress="handleKey(event)"/>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        let chatHistory = [];

        function handleKey(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function addMessage(text, isUser, sources = []) {
            const chatBox = document.getElementById('chatBox');
            const welcome = chatBox.querySelector('.welcome');
            if (welcome) welcome.remove();
            const div = document.createElement('div');
            div.className = isUser ? 'message user-message' : 'message bot-message';
            div.innerHTML = text.replace(/\n/g, '<br>');
            if (sources && sources.length > 0) {
                const srcDiv = document.createElement('div');
                srcDiv.className = 'sources';
                srcDiv.innerHTML = '📄 Sources: ' + sources.map(s => s.file + ' (Page ' + s.page + ')').join(', ');
                div.appendChild(srcDiv);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addTyping() {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message bot-message typing';
            div.id = 'typing';
            div.textContent = 'DocuMind is thinking...';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const btn = document.getElementById('sendBtn');
            const question = input.value.trim();
            if (!question) return;
            addMessage(question, true);
            input.value = '';
            btn.disabled = true;
            addTyping();
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, chat_history: chatHistory })
                });
                const data = await response.json();
                removeTyping();
                if (response.ok) {
                    addMessage(data.answer, false, data.sources);
                    chatHistory.push([question, data.answer]);
                    if (chatHistory.length > 10) chatHistory.shift();
                } else {
                    addMessage('Error: ' + data.detail, false);
                }
            } catch (err) {
                removeTyping();
                addMessage('Connection error. Is the server running?', false);
            }
            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
